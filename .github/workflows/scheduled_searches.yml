name: Scheduled Searches

on:
  schedule:
    - cron: '30 8 * * 1'   # Every Monday at 8:30am UTC (just after the weekly scout)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scheduled-searches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduled searches
        env:
          SOUNDCLOUD_CLIENT_ID:     ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
        run: python scheduled_scout.py

      - name: Commit and push results
        run: |
          git config user.name  "Sound Cave Scout"
          git config user.email "scout@thesoundcave.local"
          git add data/searches data/scheduled_searches.json
          git diff --staged --quiet || git commit -m "Scheduled searches — $(date +%Y-%m-%d)"
          git push
