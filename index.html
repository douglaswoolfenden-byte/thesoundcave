<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sound Cave</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #141414;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --orange:    #ff5500;
      --orange-dim:#b33b00;
      --text:      #ffffff;
      --muted:     #888888;
      --green:     #00c896;
      --gold:      #f5a623;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--orange);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 20px; letter-spacing: 0.5px; }
    .logo span { color: var(--orange); }
    .week-badge {
      background: var(--orange);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      background: none; border: none;
      color: var(--muted); font-size: 14px;
      padding: 10px 20px; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .stat-card .value { font-size: 26px; font-weight: bold; }
    .stat-card .value.orange { color: var(--orange); }
    .stat-card .value.green  { color: var(--green); }

    .week-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .week-nav label { font-size: 13px; color: var(--muted); }
    .week-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px;
      border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .week-select:focus { outline: none; border-color: var(--orange); }

    .track-grid { display: grid; gap: 12px; }

    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 40px 52px 1fr auto;
      gap: 16px;
      align-items: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .track-card:hover { border-color: var(--orange-dim); background: var(--surface2); }
    .track-card.dismissed { opacity: 0.3; }
    .track-card.watching  { border-color: var(--orange); }
    .track-card.repeat    { border-left: 3px solid var(--green); }

    .rank { font-size: 22px; font-weight: bold; color: var(--muted); text-align: center; }
    .rank.top3 { color: var(--orange); }

    .artwork {
      width: 52px; height: 52px;
      border-radius: 8px; object-fit: cover;
    }
    .artwork-placeholder {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .track-info { min-width: 0; }
    .track-title {
      font-size: 15px; font-weight: bold;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .track-artist { font-size: 13px; color: var(--orange); margin-bottom: 6px; }
    .track-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--muted); }

    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
    .badge.genre    { background: #1e2a3a; color: #5b9cf6; }
    .badge.repeat   { background: #0d2b22; color: var(--green); }
    .badge.trending { background: #2b1a00; color: var(--gold); }

    .track-actions {
      display: flex; flex-direction: column;
      gap: 8px; align-items: flex-end;
    }
    .score-label { font-size: 11px; color: var(--muted); text-align: right; }
    .score-value { font-size: 18px; font-weight: bold; color: var(--orange); text-align: right; }
    .action-btns { display: flex; gap: 6px; }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px; border-radius: 6px;
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--orange); color: var(--orange); }
    .btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .btn.dismiss.active { background: #333; border-color: #555; color: var(--muted); }

    .sc-link {
      color: var(--orange); text-decoration: none;
      font-size: 12px; padding: 5px 10px;
      border: 1px solid var(--orange-dim); border-radius: 6px;
      transition: background 0.15s;
    }
    .sc-link:hover { background: var(--orange); color: #fff; }

    .repeat-banner {
      background: #0d2b22; border: 1px solid #1a4a38;
      border-radius: 10px; padding: 14px 20px;
      margin-bottom: 20px; display: flex;
      align-items: center; gap: 12px; font-size: 14px;
    }
    .repeat-banner strong { color: var(--green); }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .history-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-card:hover { border-color: var(--orange); }
    .history-card .wk  { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .history-card .dt  { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
    .history-card .info { font-size: 13px; color: var(--muted); }
    .history-card .repeats { color: var(--green); margin-top: 4px; font-size: 13px; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 56px; margin-bottom: 20px; }
    .empty-state h2 { font-size: 20px; margin-bottom: 10px; color: var(--text); }
    .empty-state p  { font-size: 14px; line-height: 1.6; }

    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }

    .watchlist-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .watchlist-empty .icon { font-size: 48px; margin-bottom: 16px; }

    @media (max-width: 700px) {
      .container { padding: 16px; }
      .track-card { grid-template-columns: 32px 1fr auto; }
      .artwork, .artwork-placeholder { display: none; }
      header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎵</div>
    <h1>The Sound <span>Cave</span></h1>
  </div>
  <span id="headerWeekBadge" class="week-badge">Loading...</span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('scout')">Scout Report</button>
    <button class="tab" onclick="switchTab('watchlist')">Watchlist <span id="watchCount"></span></button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div id="tab-scout">
    <div class="stats-bar" id="statsBar"></div>
    <div class="week-nav">
      <label>Week:</label>
      <select class="week-select" id="weekSelect" onchange="loadWeek(this.value)"></select>
    </div>
    <div id="repeatBanner"></div>
    <div id="trackGrid" class="track-grid">
      <div class="loading">Loading report...</div>
    </div>
  </div>

  <div id="tab-watchlist" style="display:none">
    <div id="watchlistContent"></div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>

<script>
  let allReports  = [];
  let currentData = null;
  let currentTab  = 'scout';
  let watchlist   = JSON.parse(localStorage.getItem('sc_watching')  || '[]');
  let dismissed   = JSON.parse(localStorage.getItem('sc_dismissed') || '[]');

  function saveState() {
    localStorage.setItem('sc_watching',  JSON.stringify(watchlist));
    localStorage.setItem('sc_dismissed', JSON.stringify(dismissed));
    updateWatchCount();
  }

  function isWatching(id)  { return watchlist.includes(String(id)); }
  function isDismissed(id) { return dismissed.includes(String(id)); }

  function toggleWatch(id) {
    id = String(id);
    if (isWatching(id)) {
      watchlist = watchlist.filter(x => x !== id);
    } else {
      watchlist.push(id);
      dismissed = dismissed.filter(x => x !== id);
    }
    saveState();
    renderCurrentView();
  }

  function toggleDismiss(id) {
    id = String(id);
    if (isDismissed(id)) {
      dismissed = dismissed.filter(x => x !== id);
    } else {
      dismissed.push(id);
      watchlist = watchlist.filter(x => x !== id);
    }
    saveState();
    renderCurrentView();
  }

  function updateWatchCount() {
    document.getElementById('watchCount').textContent = watchlist.length > 0 ? `(${watchlist.length})` : '';
  }

  function switchTab(name) {
    currentTab = name;
    ['scout','watchlist','history'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
    });
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['scout','watchlist','history'][i] === name);
    });
    if (name === 'watchlist') renderWatchlist();
    if (name === 'history')   renderHistory();
  }

  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function init() {
    let manifest = null;
    try { manifest = await fetchJSON('data/manifest.json'); } catch(e) {}

    if (manifest && manifest.weeks && manifest.weeks.length) {
      for (const file of [...manifest.weeks].reverse()) {
        try {
          const data = await fetchJSON(`data/${file}`);
          if (data) allReports.push(data);
        } catch(e) {}
      }
    }

    if (!allReports.length) {
      document.getElementById('trackGrid').innerHTML = `
        <div class="empty-state">
          <div class="icon">🎵</div>
          <h2>No reports yet</h2>
          <p>The scout runs every Monday.<br>Check back after the first automated run,<br>or run <code>scout.py</code> manually to generate the first report.</p>
        </div>`;
      document.getElementById('headerWeekBadge').textContent = 'No data yet';
      return;
    }

    populateWeekSelect();
    loadWeek(allReports[0].date);
    renderHistory();
    updateWatchCount();
  }

  function populateWeekSelect() {
    document.getElementById('weekSelect').innerHTML = allReports
      .map(r => `<option value="${r.date}">Week ${r.week} — ${r.date}</option>`)
      .join('');
  }

  function loadWeek(date) {
    document.getElementById('weekSelect').value = date;
    currentData = allReports.find(r => r.date === date) || allReports[0];
    renderScout();
  }

  function renderScout() {
    if (!currentData) return;
    renderStats();
    renderRepeatBanner();
    renderTracks();
    document.getElementById('headerWeekBadge').textContent = `Week ${currentData.week}`;
  }

  function renderCurrentView() {
    if (currentTab === 'scout')     renderScout();
    if (currentTab === 'watchlist') renderWatchlist();
  }

  function renderStats() {
    const tracks  = currentData.tracks || [];
    const repeats = tracks.filter(t => t.is_repeat).length;
    const topScore = tracks.length ? tracks[0].score.toFixed(1) : '—';
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card"><div class="label">Week</div><div class="value orange">${currentData.week}</div></div>
      <div class="stat-card"><div class="label">Artists Found</div><div class="value">${tracks.length}</div></div>
      <div class="stat-card"><div class="label">Repeat Artists</div><div class="value green">${repeats}</div></div>
      <div class="stat-card"><div class="label">On Watchlist</div><div class="value orange">${tracks.filter(t=>isWatching(t.track_id)).length}</div></div>
      <div class="stat-card"><div class="label">Top Score</div><div class="value">${topScore}</div></div>
      <div class="stat-card"><div class="label">Genres Scouted</div><div class="value">${currentData.genres_scouted || '—'}</div></div>`;
  }

  function renderRepeatBanner() {
    const repeats = (currentData.tracks || []).filter(t => t.is_repeat);
    const el = document.getElementById('repeatBanner');
    if (!repeats.length) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="repeat-banner">
      <span>📈</span>
      <div><strong>${repeats.length} repeat artist${repeats.length > 1 ? 's' : ''}</strong> this week —
      ${repeats.map(t => `<strong>${esc(t.artist)}</strong>`).join(', ')}</div>
    </div>`;
  }

  function renderTracks() {
    const tracks = currentData.tracks || [];
    document.getElementById('trackGrid').innerHTML = tracks.length
      ? tracks.map(buildCard).join('')
      : '<div class="loading">No tracks in this report.</div>';
  }

  function buildCard(t) {
    const w = isWatching(t.track_id);
    const d = isDismissed(t.track_id);
    const art = t.artwork_url
      ? `<img class="artwork" src="${t.artwork_url}" alt="" onerror="this.outerHTML='<div class=artwork-placeholder>🎵</div>'">`
      : `<div class="artwork-placeholder">🎵</div>`;
    const badges = [
      t.genre    ? `<span class="badge genre">${esc(t.genre)}</span>` : '',
      t.is_repeat? `<span class="badge repeat">📈 ${t.weeks_seen} weeks</span>` : '',
      t.score > 500 ? `<span class="badge trending">🔥 Hot</span>` : '',
    ].filter(Boolean).join('');
    const cls = ['track-card', d?'dismissed':'', w?'watching':'', t.is_repeat?'repeat':''].filter(Boolean).join(' ');
    return `
      <div class="${cls}">
        <div class="rank ${t.rank<=3?'top3':''}">${t.rank}</div>
        ${art}
        <div class="track-info">
          <div class="track-title">${esc(t.title)}</div>
          <div class="track-artist">${esc(t.artist)}</div>
          <div class="track-meta">
            <span><span style="color:var(--muted)">Followers</span> ${fmt(t.followers)}</span>
            <span><span style="color:var(--muted)">Plays</span> ${fmt(t.plays)}</span>
            <span><span style="color:var(--muted)">Likes</span> ${fmt(t.likes)}</span>
            <span><span style="color:var(--muted)">Reposts</span> ${fmt(t.reposts)}</span>
            <span><span style="color:var(--muted)">Uploaded</span> ${t.uploaded}</span>
          </div>
          <div class="badges">${badges}</div>
        </div>
        <div class="track-actions">
          <div class="score-label">Score</div>
          <div class="score-value">${t.score.toFixed(1)}</div>
          <div class="action-btns">
            <button class="btn ${w?'active':''}" onclick="toggleWatch('${t.track_id}')">
              ${w ? '★ Watching' : '☆ Watch'}
            </button>
            <button class="btn dismiss ${d?'active':''}" onclick="toggleDismiss('${t.track_id}')">✕</button>
          </div>
          <a class="sc-link" href="${t.url}" target="_blank" rel="noopener">Listen ↗</a>
        </div>
      </div>`;
  }

  function renderWatchlist() {
    const el = document.getElementById('watchlistContent');
    const seen = new Set();
    const found = [];
    for (const r of allReports) {
      for (const t of (r.tracks || [])) {
        if (isWatching(t.track_id) && !seen.has(String(t.track_id))) {
          seen.add(String(t.track_id));
          found.push(t);
        }
      }
    }
    if (!found.length) {
      el.innerHTML = `<div class="watchlist-empty"><div class="icon">⭐</div><p>No artists on your watchlist yet.<br>Hit <strong>☆ Watch</strong> on any track in the Scout Report.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="stats-bar" style="margin-bottom:24px">
        <div class="stat-card"><div class="label">Watching</div><div class="value orange">${found.length}</div></div>
        <div class="stat-card"><div class="label">Repeat Artists</div><div class="value green">${found.filter(t=>t.is_repeat).length}</div></div>
      </div>
      <div class="track-grid">${found.map(buildCard).join('')}</div>`;
  }

  function renderHistory() {
    const el = document.getElementById('historyGrid');
    if (!allReports.length) { el.innerHTML = '<div class="loading">No history yet.</div>'; return; }
    el.innerHTML = allReports.map(r => {
      const repeats = (r.tracks||[]).filter(t=>t.is_repeat).length;
      return `<div class="history-card" onclick="switchTab('scout');loadWeek('${r.date}')">
        <div class="wk">WEEK ${r.week}</div>
        <div class="dt">${r.date}</div>
        <div class="info">${(r.tracks||[]).length} artists discovered</div>
        ${repeats ? `<div class="repeats">📈 ${repeats} repeat artist${repeats>1?'s':''}</div>` : ''}
      </div>`;
    }).join('');
  }

  function fmt(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
    if (n >= 1000)    return (n/1000).toFixed(1)+'K';
    return String(n);
  }
  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
