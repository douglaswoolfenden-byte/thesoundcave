name: Weekly Artist Scout

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout
        env:
          SOUNDCLOUD_CLIENT_ID:     ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
        run: python scout.py

      - name: Update manifest
        run: python update_manifest.py

      - name: Commit and push report
        run: |
          git config user.name  "Sound Cave Scout"
          git config user.email "scout@thesoundcave.local"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly scout report — $(date +%Y-%m-%d)"
          git push
