name: Daily Clan Tracker

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily tracker
        env:
          SOUNDCLOUD_CLIENT_ID:     ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
        run: python clan_tracker.py

      - name: Commit and push snapshot
        run: |
          git config user.name  "Sound Cave Tracker"
          git config user.email "tracker@thesoundcave.local"
          git add data/
          git diff --staged --quiet || git commit -m "Daily snapshot — $(date +%Y-%m-%d)"
          git push
